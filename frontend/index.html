<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoanHook</title>
    <link rel="icon" type="image/png" href="/public/hook.png?v=1" />

    <style>
      /* 1. Aggressive CSS Lockout */
      iframe.goog-te-banner-frame, 
      .goog-te-banner-frame, 
      #goog-gt-tt, 
      .goog-te-balloon-frame,
      .goog-te-menu-frame {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        height: 0 !important;
      }

      /* Prevent the 'push down' effect on the site */
      body {
        top: 0px !important;
        position: static !important;
        min-height: 100vh !important;
      }

      /* Hide the 'Show Original' button that sometimes floats */
      .skiptranslate {
        display: none !important;
      }
    </style>

    <script type="text/javascript">
      // 2. The "Nuclear" Janitor Script
      // This runs every 100ms to delete the bar if Google re-injects it
      setInterval(() => {
        const googleBar = document.querySelector('.goog-te-banner-frame');
        if (googleBar) {
          googleBar.remove();
        }
        if (document.body.style.top !== '0px') {
          document.body.style.top = '0px';
        }
      }, 100);

      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,es',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <div id="google_translate_element" style="display:none"></div>
  </body>
</html>
